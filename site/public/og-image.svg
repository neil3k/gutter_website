<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#111111"/>

  <!-- Hazard stripe top -->
  <defs>
    <pattern id="hazard" patternUnits="userSpaceOnUse" width="40" height="20" patternTransform="rotate(-45)">
      <rect width="20" height="20" fill="#FFD200"/>
      <rect x="20" width="20" height="20" fill="#111111"/>
    </pattern>
  </defs>
  <rect width="1200" height="12" fill="url(#hazard)"/>
  <rect y="618" width="1200" height="12" fill="url(#hazard)"/>

  <!-- Gutter/roof icon -->
  <path d="M540 180L600 140L660 180" stroke="#FFD200" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <rect x="530" y="180" width="140" height="10" rx="3" fill="#FFD200"/>
  <rect x="650" y="190" width="8" height="20" rx="2" fill="#FFD200"/>

  <!-- Business name -->
  <text x="600" y="280" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="56" fill="#FFD200" letter-spacing="2">WARBOYS</text>
  <text x="600" y="340" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="56" fill="#FFFFFF" letter-spacing="2">GUTTER CLEARING</text>

  <!-- Tagline -->
  <text x="600" y="400" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="28" fill="#CCCCCC">Professional Gutter Clearing in Cambridgeshire</text>

  <!-- Trust points -->
  <text x="600" y="470" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="22" fill="#FFD200">No Ladders · Fully Insured · No Mess</text>

  <!-- Phone -->
  <text x="600" y="530" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="30" fill="#FFFFFF">07936 085632</text>
</svg>
